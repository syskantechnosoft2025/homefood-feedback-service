apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback-service
  namespace: homefood
  labels:
    app: feedback-service
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feedback-service
  template:
    metadata:
      labels:
        app: feedback-service
    spec:
      containers:
        - name: feedback-service
          image: ghcr.io/syskantechnosoft2025/homefood-feedback-service:latest
          ports:
            - containerPort: 8087
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: feedback-service
  namespace: homefood
spec:
  selector:
    app: feedback-service
  ports:
    - port: 8087
      targetPort: 8087
  type: ClusterIP